<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="IJSE Web CSS Tute 01">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Flex Layout</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        section{
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        div{
            width: 50vw;
            height: 50vh;
            position: absolute;
        }

        #div1{
            background-color: red;
        }

        #div2{
            background-color: green;
            right: 0;
            top: 0;
        }

        #div3{
            background-color: orange;
            bottom: 0;
            left: 0;
        }

        #div4{
            background-color: deeppink;
            bottom: 0;
            right: 0;
        }

        #centerSquare{
            height: Calc(100vh / 3);
            width: Calc(100vh / 3);
            position: absolute;
            background-color: white;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
        }

        #centerCircle{
            background-color: red;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
        }

        .bigCircle{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: white;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
        }
    </style>

</head>

<body>

<section>
    <div id="div1">
        <div class="bigCircle"></div>
    </div>
    <div id="div2">
        <div class="bigCircle"></div>
    </div>
    <div id="div3">
        <div class="bigCircle"></div>
    </div>
    <div id="div4">
        <div class="bigCircle"></div>
    </div>

    <div id="centerSquare">
        <div id="centerCircle"></div>
    </div>
</section>
</body>

</html>
