<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="IJSE Web CSS Tute 01">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Tute Case 02</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        header{
            position: relative;
            background-color: white;
            height: 100px;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            box-shadow: 2px 0px 2px 2px black;
            z-index: 1;
        }

        header > img{
            width: 200px;
            margin-left: 20px;
            position: absolute;
        }

        header > nav{
            position: absolute;
            right: 0;
            margin-right: 50px;
        }

        header > nav > a{
            text-decoration: none;
            font-family: sans-serif;
            color: black;
            margin-left: 10px;
        }

        footer{
            height: 70px;
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: gray;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        aside{
            position: absolute;
            left: 0;
            width: 300px;
            top: 0;
            bottom: 0;
            background-color: blueviolet;
            z-index: 0;
        }

        aside > nav{
            display: flex;
            flex-direction: column;
            margin-left: 50px;
            margin-top: 125px;
        }

        aside > nav > a{
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            margin-top: 20px;
        }
    </style>

</head>

<body>
    <header>
        <img src="../assets/images/ijse.png" alt="logo">

        <nav>
            <a href="">Home</a>
            <a href="">Services</a>
            <a href="">Contacts</a>
            <a href="">About Us</a>
        </nav>
    </header>

<footer>
    Developed By IJSE
</footer>

<aside>
    <nav>
        <a href="">Home</a>
        <a href="">Services</a>
        <a href="">Contacts</a>
        <a href="">About Us</a>
    </nav>
</aside>
</body>

</html>
